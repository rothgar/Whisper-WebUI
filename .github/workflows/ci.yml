name: CI

on:
  workflow_dispatch:

  push:
    branches:
      - master
      - intel-gpu
  pull_request:
    branches:
      - master
      - intel-gpu

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]

    env:
      DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}

    steps:
      - name: Clean up space for action
        run: rm -rf /opt/hostedtoolcache

      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install git and ffmpeg
        run: sudo apt-get update && sudo apt-get install -y git ffmpeg

      - name: Install dependencies
        run: |
          git clone --depth 1 https://github.com/jhj0517/jhj0517-whisper.git /tmp/jhj0517-whisper
          python3 scripts/patch_whisper_dep.py /tmp/jhj0517-whisper
          pip install /tmp/jhj0517-whisper
          grep -v 'jhj0517-whisper' requirements.txt > /tmp/req.txt
          pip install -r /tmp/req.txt pytest jiwer

      - name: Run test
        run: python -m pytest -rs tests

  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]

    env:
      DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      TEST_ENV: true

    steps:
      - name: Clean up space for action
        run: rm -rf /opt/hostedtoolcache

      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install git and ffmpeg
        run: sudo apt-get update && sudo apt-get install -y git ffmpeg

      - name: Install dependencies
        run: |
          git clone --depth 1 https://github.com/jhj0517/jhj0517-whisper.git /tmp/jhj0517-whisper
          python3 scripts/patch_whisper_dep.py /tmp/jhj0517-whisper
          pip install /tmp/jhj0517-whisper
          mkdir -p /tmp/filtered/backend
          grep -v 'jhj0517-whisper' requirements.txt > /tmp/filtered/requirements.txt
          cp backend/requirements-backend.txt /tmp/filtered/backend/
          pip install -r /tmp/filtered/backend/requirements-backend.txt pytest pytest-asyncio jiwer

      - name: Run test
        run: python -m pytest -rs backend/tests

  test-shell-script:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: [ "3.10", "3.11", "3.12" ]

    steps:
      - name: Clean up space for action
        run: rm -rf /opt/hostedtoolcache

      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install git and ffmpeg
        run: sudo apt-get update && sudo apt-get install -y git ffmpeg

      - name: Execute Install.sh
        run: |
          chmod +x ./Install.sh
          ./Install.sh

      - name: Execute start-webui.sh
        run: |
          chmod +x ./start-webui.sh
          timeout 60s ./start-webui.sh || true

